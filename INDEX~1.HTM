<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>The Soft-Pawed Reckoning &mdash; A Safe Paws Cyprus Comic</title>
<meta name="description" content="The Soft-Pawed Reckoning. Issue One. A Safe Paws Cyprus comic in the manner of Edgar Allan Poe." />
<meta property="og:title" content="The Soft-Pawed Reckoning" />
<meta property="og:description" content="A Safe Paws Cyprus comic, in the manner of Edgar Allan Poe." />
<meta property="og:type" content="article" />
<meta property="og:image" content="images/page-01.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/jpeg" href="images/thumbs/page-01.jpg" />
<style>
  :root {
    --bg: #050505;
    --bg-soft: #0c0c0d;
    --ink: #ededed;
    --ink-dim: #9a9a9a;
    --eye: #f08a17;
    --eye-glow: #ffb347;
    --rule: #1d1d1f;
    --panel: #111113;
    --shadow: 0 30px 80px rgba(0,0,0,.85), 0 0 1px rgba(240,138,23,.25);
    --serif: "Cormorant Garamond", "Garamond", "Georgia", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(900px 600px at 50% -10%, rgba(240,138,23,0.08), transparent 60%),
      radial-gradient(700px 500px at 100% 100%, rgba(240,138,23,0.05), transparent 60%),
      var(--bg);
  }

  /* ---------- COVER / SPLASH ---------- */
  #splash {
    position: fixed; inset: 0;
    z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 80%);
    padding: 32px 20px;
    text-align: center;
    transition: opacity .8s ease, visibility .8s;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .splash-eyes {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .splash-eyes .eye {
    position: absolute;
    width: 14px; height: 7px;
    background: var(--eye);
    border-radius: 50%;
    box-shadow: 0 0 14px var(--eye-glow);
    opacity: .55;
    animation: blink 5s infinite;
  }

  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); opacity: .55; }
    94% { transform: scaleY(0.05); opacity: .2; }
  }

  .splash-card {
    position: relative;
    max-width: 640px;
    z-index: 1;
  }

  .kicker {
    font-family: var(--sans);
    letter-spacing: .35em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--eye);
    margin-bottom: 18px;
  }

  .splash-card h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: clamp(38px, 7vw, 72px);
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    text-transform: uppercase;
  }
  .splash-card h1 .o { color: var(--eye); }

  .splash-card .pull {
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-dim);
    font-size: clamp(15px, 2vw, 19px);
    margin: 18px auto 36px;
    max-width: 520px;
  }

  .begin-btn {
    appearance: none; border: 1px solid var(--eye);
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: .3em;
    text-transform: uppercase;
    padding: 16px 30px;
    cursor: pointer;
    transition: all .25s ease;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .begin-btn::before {
    content: "";
    width: 8px; height: 8px;
    background: var(--eye);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--eye-glow);
  }
  .begin-btn:hover {
    background: var(--eye);
    color: #000;
    box-shadow: 0 0 30px rgba(240,138,23,0.4);
  }
  .begin-btn:hover::before { background: #000; box-shadow: none; }

  .splash-meta {
    margin-top: 32px;
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
  }

  /* ---------- READER ---------- */
  #reader {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    position: sticky; top: 0;
    z-index: 30;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: rgba(5,5,5,0.78);
    border-bottom: 1px solid var(--rule);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--serif);
    font-size: 16px;
    letter-spacing: .02em;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--eye);
    box-shadow: 0 0 10px var(--eye-glow);
  }
  .brand .title-small { font-weight: 600; }
  .brand .sep { color: var(--ink-dim); margin: 0 4px; }
  .brand .issue { color: var(--ink-dim); font-style: italic; font-size: 14px; }

  .top-tools { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    appearance: none; border: 1px solid var(--rule);
    background: transparent; color: var(--ink-dim);
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 4px;
    transition: all .2s ease;
  }
  .icon-btn:hover { color: var(--eye); border-color: var(--eye); }
  .icon-btn svg { width: 16px; height: 16px; }

  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 18px 100px;
    position: relative;
    min-height: calc(100vh - 60px);
  }

  .page-wrap {
    position: relative;
    width: 100%;
    max-width: 920px;
    user-select: none;
  }

  .page-img-frame {
    position: relative;
    background: var(--panel);
    box-shadow: var(--shadow);
    border: 1px solid var(--rule);
    overflow: hidden;
    aspect-ratio: 8.5 / 11;
  }
  .page-img-frame img {
    display: block;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }

  .page-img-frame img.fading {
    opacity: 0;
    transition: opacity .35s ease;
  }
  .page-img-frame img.shown {
    opacity: 1;
    transition: opacity .35s ease;
  }

  /* clickable nav zones over the image */
  .nav-zone {
    position: absolute; top: 0; bottom: 0;
    width: 30%;
    cursor: pointer;
    z-index: 2;
  }
  .nav-zone.left  { left: 0;  cursor: w-resize; }
  .nav-zone.right { right: 0; cursor: e-resize; }
  .nav-zone:hover::after {
    content: "";
    position: absolute; top: 0; bottom: 0;
    width: 100%;
    background: linear-gradient(to right, rgba(240,138,23,0.06), transparent);
  }
  .nav-zone.right:hover::after {
    background: linear-gradient(to left, rgba(240,138,23,0.06), transparent);
  }

  .arrow-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(240,138,23,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--eye);
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s ease;
  }
  .arrow-hint svg { width: 18px; height: 18px; }
  .arrow-hint.left { left: 14px; }
  .arrow-hint.right { right: 14px; }
  .nav-zone:hover + .arrow-hint,
  .nav-zone.left:hover ~ .arrow-hint.left,
  .nav-zone.right:hover ~ .arrow-hint.right { opacity: 1; }

  /* ---------- BOTTOM CONTROLS ---------- */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 25;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: rgba(5,5,5,0.85);
    border-top: 1px solid var(--rule);
    padding: 10px 18px;
    display: flex; align-items: center; gap: 14px;
  }

  .progress {
    flex: 1;
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .progress .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--eye), var(--eye-glow));
    transition: width .3s ease;
    box-shadow: 0 0 8px rgba(240,138,23,0.7);
  }

  .counter {
    font-family: var(--serif);
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--ink-dim);
    min-width: 60px;
    text-align: center;
  }
  .counter b { color: var(--ink); font-weight: 600; }

  .nav-btn {
    appearance: none;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink);
    padding: 8px 16px;
    font-size: 12px;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s ease;
    font-family: var(--sans);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--eye);
    color: var(--eye);
  }
  .nav-btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }

  /* ---------- THUMBNAIL DRAWER ---------- */
  #thumbsDrawer {
    position: fixed;
    bottom: 60px; left: 0; right: 0;
    background: rgba(5,5,5,0.95);
    border-top: 1px solid var(--rule);
    padding: 16px;
    transform: translateY(110%);
    transition: transform .35s ease;
    z-index: 24;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  #thumbsDrawer.open { transform: translateY(0); }

  .thumbs-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }
  .thumbs-row::-webkit-scrollbar { height: 6px; }
  .thumbs-row::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

  .thumb {
    flex: 0 0 auto;
    width: 80px;
    cursor: pointer;
    text-align: center;
    border: 2px solid transparent;
    transition: all .2s;
    background: var(--panel);
  }
  .thumb img { width: 100%; height: auto; display: block; }
  .thumb .num {
    font-size: 10px;
    color: var(--ink-dim);
    padding: 4px 0;
    font-family: var(--serif);
  }
  .thumb:hover { border-color: rgba(240,138,23,0.5); }
  .thumb.active {
    border-color: var(--eye);
    box-shadow: 0 0 12px rgba(240,138,23,0.5);
  }
  .thumb.active .num { color: var(--eye); }

  /* ---------- FOOTER ---------- */
  .end-card {
    display: none;
    text-align: center;
    padding: 60px 24px 80px;
    border-top: 1px solid var(--rule);
    margin-top: 40px;
  }
  .end-card.shown { display: block; }
  .end-card h2 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(22px, 4vw, 30px);
    color: var(--ink);
    margin: 0 0 10px;
  }
  .end-card p {
    color: var(--ink-dim);
    margin: 6px 0;
    font-family: var(--serif);
    font-size: 16px;
  }
  .end-card .restart {
    margin-top: 24px;
  }

  /* ---------- ZOOM ---------- */
  #zoomOverlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    cursor: zoom-out;
  }
  #zoomOverlay.shown { display: flex; }
  #zoomOverlay img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    box-shadow: var(--shadow);
  }
  #zoomOverlay .close-zoom {
    position: absolute; top: 20px; right: 20px;
    color: var(--ink-dim);
    font-size: 24px; cursor: pointer;
    width: 40px; height: 40px;
    border: 1px solid var(--rule);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  #zoomOverlay .close-zoom:hover { color: var(--eye); border-color: var(--eye); }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 720px) {
    .nav-btn span { display: none; }
    .nav-btn { padding: 8px 10px; }
    .top-bar { padding: 10px 12px; }
    .brand { font-size: 14px; }
    .brand .issue { display: none; }
    .stage { padding: 16px 8px 90px; }
    .arrow-hint { width: 36px; height: 36px; }
    .thumb { width: 60px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<!-- ============== SPLASH / COVER ============== -->
<section id="splash">
  <div class="splash-eyes" id="splashEyes" aria-hidden="true"></div>
  <div class="splash-card">
    <div class="kicker">A Safe Paws Cyprus Comic &middot; Issue One</div>
    <h1>The S<span class="o">o</span>ft-Pawed Reck<span class="o">o</span>ning</h1>
    <p class="pull">&ldquo;I have, the records will agree, been a careful man.&rdquo;</p>
    <button class="begin-btn" id="beginBtn">Begin Reading</button>
    <div class="splash-meta">In the manner of Edgar Allan Poe</div>
  </div>
</section>

<!-- ============== READER ============== -->
<main id="reader" aria-hidden="true">
  <div class="top-bar">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <span class="title-small">The Soft-Pawed Reckoning</span>
      <span class="sep">&bull;</span>
      <span class="issue">Safe Paws Cyprus</span>
    </div>
    <div class="top-tools">
      <button class="icon-btn" id="thumbsToggle" aria-label="Toggle thumbnails" title="Pages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="icon-btn" id="fullscreenBtn" aria-label="Fullscreen" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="page-wrap">
      <div class="page-img-frame">
        <img id="pageImg" src="images/page-01.jpg" alt="Page 1" class="shown" />
        <div class="nav-zone left"  id="zoneLeft"  aria-label="Previous page" role="button" tabindex="0"></div>
        <div class="nav-zone right" id="zoneRight" aria-label="Next page" role="button" tabindex="0"></div>
        <div class="arrow-hint left" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="arrow-hint right" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>
  </div>

  <div class="end-card" id="endCard">
    <h2>&mdash; and there, dear reader, I leave him.</h2>
    <p>Thank you for reading.</p>
    <p style="font-size: 13px; letter-spacing: .2em; text-transform: uppercase; margin-top: 24px;">&copy; Safe Paws Cyprus</p>
    <div class="restart">
      <button class="nav-btn" id="restartBtn">&larr; Read Again</button>
    </div>
  </div>

  <div id="thumbsDrawer">
    <div class="thumbs-row" id="thumbsRow"></div>
  </div>

  <div class="bottom-bar">
    <button class="nav-btn" id="prevBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Prev</span>
    </button>
    <div class="progress" id="progress" role="slider" aria-label="Reading progress">
      <div class="bar" id="progressBar"></div>
    </div>
    <div class="counter"><b id="curPage">1</b> / <span id="totalPages">12</span></div>
    <button class="nav-btn" id="nextBtn">
      <span>Next</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</main>

<div id="zoomOverlay" role="dialog" aria-label="Zoomed page">
  <div class="close-zoom" id="closeZoom" aria-label="Close zoom">&times;</div>
  <img id="zoomImg" src="" alt="Zoomed page" />
</div>

<script>
  const TOTAL = 12;
  const pad = n => String(n).padStart(2, '0');
  const pageSrc = i => `images/page-${pad(i)}.jpg`;
  const thumbSrc = i => `images/thumbs/page-${pad(i)}.jpg`;

  const splash       = document.getElementById('splash');
  const reader       = document.getElementById('reader');
  const beginBtn     = document.getElementById('beginBtn');
  const pageImg      = document.getElementById('pageImg');
  const prevBtn      = document.getElementById('prevBtn');
  const nextBtn      = document.getElementById('nextBtn');
  const curPageEl    = document.getElementById('curPage');
  const totalEl      = document.getElementById('totalPages');
  const progressEl   = document.getElementById('progress');
  const progressBar  = document.getElementById('progressBar');
  const stage        = document.getElementById('stage');
  const zoneLeft     = document.getElementById('zoneLeft');
  const zoneRight    = document.getElementById('zoneRight');
  const thumbsToggle = document.getElementById('thumbsToggle');
  const thumbsDrawer = document.getElementById('thumbsDrawer');
  const thumbsRow    = document.getElementById('thumbsRow');
  const fullscreenBtn= document.getElementById('fullscreenBtn');
  const endCard      = document.getElementById('endCard');
  const restartBtn   = document.getElementById('restartBtn');
  const zoomOverlay  = document.getElementById('zoomOverlay');
  const zoomImg      = document.getElementById('zoomImg');
  const closeZoom    = document.getElementById('closeZoom');

  totalEl.textContent = TOTAL;

  // populate splash eyes
  (function makeEyes() {
    const eyes = document.getElementById('splashEyes');
    const N = 22;
    for (let i = 0; i < N; i++) {
      const e = document.createElement('span');
      e.className = 'eye';
      e.style.left = (Math.random() * 100) + '%';
      e.style.top  = (Math.random() * 100) + '%';
      e.style.animationDelay = (Math.random() * 5) + 's';
      e.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
      eyes.appendChild(e);
    }
  })();

  // populate thumbnails
  for (let i = 1; i <= TOTAL; i++) {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === 1 ? ' active' : '');
    t.dataset.page = i;
    t.innerHTML = `<img loading="lazy" src="${thumbSrc(i)}" alt="Page ${i}" /><div class="num">${pad(i)}</div>`;
    t.addEventListener('click', () => goTo(i));
    thumbsRow.appendChild(t);
  }

  // preload all pages quietly
  for (let i = 1; i <= TOTAL; i++) {
    const im = new Image();
    im.src = pageSrc(i);
  }

  let current = 1;

  function update() {
    pageImg.classList.add('fading');
    setTimeout(() => {
      pageImg.src = pageSrc(current);
      pageImg.alt = `Page ${current}`;
      pageImg.onload = () => pageImg.classList.remove('fading');
    }, 200);

    curPageEl.textContent = current;
    progressBar.style.width = ((current / TOTAL) * 100) + '%';
    prevBtn.disabled = (current === 1);
    nextBtn.disabled = (current === TOTAL);

    [...thumbsRow.children].forEach((c, idx) => {
      c.classList.toggle('active', idx + 1 === current);
    });
    const activeThumb = thumbsRow.children[current - 1];
    if (activeThumb && thumbsDrawer.classList.contains('open')) {
      activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    endCard.classList.toggle('shown', current === TOTAL);

    if (history && history.replaceState) {
      history.replaceState(null, '', '#p' + current);
    }
  }

  function goTo(n) {
    n = Math.max(1, Math.min(TOTAL, n));
    if (n === current) return;
    current = n;
    update();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  const next = () => goTo(current + 1);
  const prev = () => goTo(current - 1);

  // begin
  function startReading() {
    splash.classList.add('hidden');
    reader.setAttribute('aria-hidden', 'false');
    if (location.hash && /^#p\d+$/.test(location.hash)) {
      const n = parseInt(location.hash.slice(2), 10);
      if (!isNaN(n)) { current = Math.max(1, Math.min(TOTAL, n)); update(); }
    }
  }
  beginBtn.addEventListener('click', startReading);

  // skip splash if hash deep-links to a page
  if (location.hash && /^#p\d+$/.test(location.hash)) {
    setTimeout(startReading, 50);
  }

  // controls
  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);
  zoneLeft.addEventListener('click', prev);
  zoneRight.addEventListener('click', next);

  // double-click image to zoom
  pageImg.addEventListener('dblclick', () => {
    zoomImg.src = pageSrc(current);
    zoomOverlay.classList.add('shown');
  });
  zoomOverlay.addEventListener('click', () => zoomOverlay.classList.remove('shown'));
  closeZoom.addEventListener('click', e => { e.stopPropagation(); zoomOverlay.classList.remove('shown'); });

  // progress click-to-jump
  progressEl.addEventListener('click', e => {
    const rect = progressEl.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    goTo(Math.round(ratio * TOTAL) || 1);
  });

  // restart
  restartBtn.addEventListener('click', () => goTo(1));

  // thumbs toggle
  thumbsToggle.addEventListener('click', () => {
    thumbsDrawer.classList.toggle('open');
    if (thumbsDrawer.classList.contains('open')) {
      const a = thumbsRow.children[current - 1];
      if (a) a.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  });

  // fullscreen
  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  });

  // keyboard
  document.addEventListener('keydown', e => {
    if (zoomOverlay.classList.contains('shown')) {
      if (e.key === 'Escape') zoomOverlay.classList.remove('shown');
      return;
    }
    if (splash.classList.contains('hidden') === false) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startReading(); }
      return;
    }
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft') { prev(); }
    else if (e.key === 'Home') { goTo(1); }
    else if (e.key === 'End')  { goTo(TOTAL); }
    else if (e.key === 'Escape') {
      thumbsDrawer.classList.remove('open');
      if (document.fullscreenElement) document.exitFullscreen?.();
    }
  });

  // touch swipe
  let tx = 0, ty = 0;
  stage.addEventListener('touchstart', e => {
    tx = e.changedTouches[0].clientX;
    ty = e.changedTouches[0].clientY;
  }, { passive: true });
  stage.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) next(); else prev();
    }
  }, { passive: true });

  update();
</script>
</body>
</html>
